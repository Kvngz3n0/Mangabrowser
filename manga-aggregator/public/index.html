<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imperious Manga Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-particles" id="particles"></div>

  <header class="imperial-header">
    <div class="header-glow"></div>
    <div class="header-inner">
      <a href="#" class="brand" onclick="app.goHome()">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2L38 11V29L20 38L2 29V11L20 2Z" stroke="url(#goldGrad)" stroke-width="1.5" fill="none"/>
            <path d="M20 8L32 14.5V25.5L20 32L8 25.5V14.5L20 8Z" stroke="url(#goldGrad2)" stroke-width="1" fill="none" opacity="0.6"/>
            <text x="20" y="24" text-anchor="middle" fill="url(#goldGrad)" font-size="10" font-family="Cinzel" font-weight="700">I</text>
            <defs>
              <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#BF953F"/>
                <stop offset="50%" stop-color="#FCF6BA"/>
                <stop offset="100%" stop-color="#B38728"/>
              </linearGradient>
              <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#D4AF37"/>
                <stop offset="100%" stop-color="#8B6914"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-imperious">IMPERIOUS</span>
          <span class="brand-manga">MANGA</span>
        </div>
      </a>

      <nav class="imperial-nav">
        <a href="#" class="nav-link active" data-view="home" onclick="app.setView('home')">
          <span class="nav-glow"></span>
          <span class="nav-text">Home</span>
        </a>
        <a href="#" class="nav-link" data-view="library" onclick="app.setView('library')">
          <span class="nav-glow"></span>
          <span class="nav-text">Library</span>
        </a>
        <a href="#" class="nav-link" data-view="latest" onclick="app.setView('latest')">
          <span class="nav-glow"></span>
          <span class="nav-text">Latest</span>
        </a>
        <a href="#" class="nav-link" data-view="manhwa" onclick="app.setView('manhwa')">
          <span class="nav-glow"></span>
          <span class="nav-text">Manhwa</span>
        </a>
        <a href="#" class="nav-link" data-view="manhua" onclick="app.setView('manhua')">
          <span class="nav-glow"></span>
          <span class="nav-text">Manhua</span>
        </a>
        <a href="#" class="nav-link" data-view="webtoon" onclick="app.setView('webtoon')">
          <span class="nav-glow"></span>
          <span class="nav-text">Webtoons</span>
        </a>
      </nav>

      <div class="search-imperial">
        <div class="search-field">
          <input type="text" id="searchInput" placeholder="Search 60+ sources..." autocomplete="off">
          <div class="search-underline"></div>
          <button class="search-btn" onclick="app.search()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="imperial-main">
    <div class="stats-imperial" id="statsBar">
      <div class="stat-card">
        <div class="stat-shine"></div>
        <div class="stat-number" id="totalManga">0</div>
        <div class="stat-label">Manga</div>
      </div>
      <div class="stat-card">
        <div class="stat-shine"></div>
        <div class="stat-number" id="totalChapters">0</div>
        <div class="stat-label">Chapters</div>
      </div>
      <div class="stat-card">
        <div class="stat-shine"></div>
        <div class="stat-number" id="totalSources">0</div>
        <div class="stat-label">Sources</div>
      </div>
    </div>

    <div class="filter-imperial" id="filterBar">
      <button class="filter-pill active" data-filter="all" onclick="app.setFilter('all')">All</button>
      <button class="filter-pill" data-filter="manga" onclick="app.setFilter('manga')">Manga</button>
      <button class="filter-pill" data-filter="manhwa" onclick="app.setFilter('manhwa')">Manhwa</button>
      <button class="filter-pill" data-filter="manhua" onclick="app.setFilter('manhua')">Manhua</button>
      <button class="filter-pill" data-filter="webtoon" onclick="app.setFilter('webtoon')">Webtoon</button>
    </div>

    <div class="section-title" id="sectionTitle">
      <div class="title-line"></div>
      <h2 id="pageTitle">Discover</h2>
      <div class="title-line"></div>
    </div>

    <div class="masonry-grid" id="mangaGrid"></div>

    <div class="loading-imperial" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Summoning content...</div>
    </div>
  </main>

  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-backdrop" onclick="app.closeDetail()"></div>
    <div class="detail-panel">
      <button class="detail-close" onclick="app.closeDetail()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <div class="detail-content" id="detailContent"></div>
    </div>
  </div>

  <div class="reader-overlay" id="readerOverlay">
    <div class="reader-header">
      <button class="reader-back" onclick="app.closeReader()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
      <div class="reader-title" id="readerTitle"></div>
      <div class="reader-controls">
        <button class="reader-btn" onclick="app.prevPage()">Prev</button>
        <span class="reader-page" id="readerPage">1 / 1</span>
        <button class="reader-btn" onclick="app.nextPage()">Next</button>
      </div>
    </div>
    <div class="reader-pages" id="readerPages"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
